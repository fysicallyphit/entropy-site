<main>
  <section>
    <p class="label">Contact</p>
    <h1>BOOK A CALL</h1>
    <div class="divider"></div>
    <p>Whether you operate a data center, purchase heat, or are exploring a partnership,</p>
      <p> reach out to book a demo.</p>

    <form action="https://formspree.io/f/xwvaoeyd" method="POST" >
      <a href="https://calendly.com/natalienarima/30min" target="_blank" class="btn-calendly">Book a Call</a>
  
      <label for="name">Name</label>
        <input type="text" id="name" name="name" autocomplete="name" required />
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" required />
        <label for="org">Organization</label>
        <input type="text" id="org" name="org" />
        <label for="message">Message</label>
        <textarea id="message" name="message"></textarea>
<div class="contact-actions">
        <button type="submit">Send Message</button>
      </div>
    </form>
  </section>
</main>

<footer>
  <p>© 2026 Entropy</p>
  <p>Data center heat reuse infrastructure</p>
</footer>
